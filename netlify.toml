[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Long-cache hashed assets (Vite emits content-hashed file names)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Force download for the book file (so it never opens in-browser)
[[headers]]
  for = "/RW.docx"
  [headers.values]
    Content-Type = "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    Content-Disposition = "attachment; filename=\"English-Reading-and-Writing-Practice.docx\""
    Cache-Control = "public, max-age=3600"

# SPA-style fallback (safe for single-page apps and anchor routes)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
